<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recall Master Game</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <h1>Recall Master</h1>
    <h2>Press any key to start the game</h2>
    <div class="btn-container">
        <div class="line-one">
            <div class="btn " type="button" id="apple">
                <img src="apple.jpg" alt="apple" ><br>
                <h5>Apple</h5>
            </div>
            <div class="btn " type="button" id="grapes">
                <img src="grapes.jpg" alt="grapes" ><br>
                <h5>Grapes</h5>
            </div>
        </div>
        <div class="line-two">
            <div class="btn " type="button" id="orange">
                <img src="orange.jpg" alt="orange" ><br>
                <h5>Orange</h5>
            </div>
            <div class="btn " type="button" id="banana">
                <img src="banana.jpg" alt="banana" ><br>
                <h5>Banana</h5>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
